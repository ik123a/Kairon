name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system deps (for FAISS)
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev libomp-dev swig

      - name: Install kairon
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install sentence-transformers for embeddings tests
        run: |
          python -m pip install sentence-transformers torch --quiet

      - name: Run unit tests
        run: |
          python -m pytest tests/test_core.py -v --tb=short
        env:
          HF_HUB_DISABLE_PROGRESS_BARS: 1

      - name: Run benchmark smoke test
        run: |
          python -m pytest tests/test_benchmark.py --collect-only
        env:
          HF_HUB_DISABLE_PROGRESS_BARS: 1

  lint:
    name: Lint with ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check src/ tests/ examples/
      - run: ruff format --check src/ tests/

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install build
      - run: python -m build
      - name: Verify with twine
        run: pip install twine && python -m twine check dist/*

      # Note: Actual PyPI publish requires trusted publishing setup
      # at https://pypi.org/manage/account/publishing/
      # See PUBLISHING.md for the full guide.
